<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ voting.title }}</title>
    <style>

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f3e5f5 0%, #e1bee7 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #400;
        }

        .option {
            margin: 10px 0;
            padding: 20px 60px;
            border: 1px solid #ddd;
            cursor: pointer;
            background-color: #f3e5f5;
            color: grey;
            justify-content: center;
        }

        .option:hover {
            background-color: #f0f0f0;
            justify-content: center;
        }

        .option.selected {
            background-color: #cce5ff;
            border-color: #0066cc;
        }

        button {
            padding: 10px 20px;
            background-color: #6a1b9a;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: background-color 0.3s;
            justify-content: center;
            text-align: center;
        }

        button:hover {
            background-color: #4a148c;
        }

        #result {
            margin-top: 20px;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 5px;
        }

                .nav-links {
            margin-top: 20px;
            text-align: center;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-links a {
            text-decoration: none;
        }

                .container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 550px;
            box-sizing: border-box;
        }

        .description {
            color: #666;
            text-align: center;
            margin-bottom: 20px;
            font-style: italic;
        }

        h2 {
            color: #4a148c;
            text-align: center;
            margin-top: 0;
            border-bottom: 2px solid #f3e5f5;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
         li {
            background-color: #fcfaff;
            margin: 8px 0;
            padding: 12px 15px;
            border: 1px solid #e1bee7;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s;
        }

        li:hover {
            transform: translateX(5px);
            border-color: #9c27b0;
        }
    </style>

</head>
<div class="container">
    <form method="post">
        <body>
        {% csrf_token %}
        <h2> {{ voting.title }} </h2>
        <p class="description"> {{ voting.description }} </p>

        {% for radio in form.option %}
        <li>
            <div>
                {{ radio.tag }}
                {{ radio.choice_label }}
            </div>
        </li>
        {% endfor %}
        <button style="text-align: center;" type="submit" >Голосовать</button>


        </body>
    </form>
</div>
    <!-- Кнопки навигации -->
    <div class="nav-links">
        <a href="/"> <button>Главная страница</button> </a>
        {% if request.user.is_authenticated %}
            <a href="/profile/{{ request.user.username }}">
                <button>Профиль: {{ request.user }}</button>
            </a>
            <a href="/logout/">
                <button style="background-color: #555;">Выйти</button>
            </a>
        {% else %}
            <a href="/login/">
                <button>Войти</button>
            </a>
        {% endif %}
    </div>
</html>
