<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ voting.title }}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 20px auto;
            padding: 20px;
        }

        h1 {
            color: #333;
        }

        .option {
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #ddd;
            cursor: pointer;
        }

        .option:hover {
            background-color: #f0f0f0;
        }

        .option.selected {
            background-color: #cce5ff;
            border-color: #0066cc;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #0066cc;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #0052a3;
        }

        #result {
            margin-top: 20px;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 5px;
        }
    </style>

</head>
<form method="post">
    <body>
    {% csrf_token %}
    <p> {{ voting.title }} </p>
    <p> {{ voting.description }} </p>

    {% for radio in form.option %}
    <div  class="option" >
        {{ radio.tag }}
        {{ radio.choice_label }}
    </div>
    {% endfor %}
    <button type="submit" >Голосовать</button>
    </body>
</form>
</html>
