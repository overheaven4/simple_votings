<head>
    <title>Новое голосование</title>
     <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Светло-фиолетовый градиент для мягкого вида */
            background: linear-gradient(135deg, #f3e5f5 0%, #e1bee7 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 550px;
        }

        h2 {
            color: #4a148c;
            text-align: center;
            margin-top: 0;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #6a1b9a;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1bee7;
            border-radius: 8px;
            box-sizing: border-box; /* Чтобы padding не раздувал ширину */
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #9c27b0;
        }

        .option {
            margin: 10px 0;
            padding: 15px;
            background-color: #fcfaff;
            border: 1px dashed #ce93d8;
            border-radius: 8px;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background-color: #9c27b0;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #7b1fa2;
        }
        .nav-links {
            margin-top: 20px;
            text-align: center;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-links a {
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Создать новое голосование</h2>
        <form method="POST">
            {% csrf_token %}
            <div style="margin-bottom: 15px;">
                <label>Заголовок:</label>
                <input type="text" name="title" required placeholder="Введите название...">
            </div>
            <div style="margin-bottom: 15px;">
                <label>Вопрос:</label>
                <textarea name="question" required placeholder="О чем вы хотите спросить?" style="height: 100px; resize: vertical;"></textarea>
            </div>

            <label>Варианты ответов:</label>
            <div class="option">
                <input type="text" name="option" placeholder="Вариант 1">
            </div>

            <div class="option">
                <input type="text" name="option" placeholder="Вариант 2">
            </div>

            <button type="submit">Создать голосование</button>
        </form>
    </div>
</body>
