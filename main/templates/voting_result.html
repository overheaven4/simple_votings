<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ voting.title }}</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f3e5f5 0%, #e1bee7 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 550px;
            box-sizing: border-box;
        }

        h2 {
            color: #4a148c;
            text-align: center;
            margin-top: 0;
            border-bottom: 2px solid #f3e5f5;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .description {
            color: #666;
            text-align: center;
            margin-bottom: 20px;
            font-style: italic;
        }

        /* Список результатов */
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        li {
            background-color: #fcfaff;
            margin: 8px 0;
            padding: 12px 15px;
            border: 1px solid #e1bee7;
            border-radius: 8px;
            display: flex;
            justify-content: space-between; /* Разносит название и голоса по краям */
            align-items: center;
            transition: transform 0.2s;
        }

        li:hover {
            transform: translateX(5px);
            border-color: #9c27b0;
        }

        .option-text {
            color: #4a148c;
            font-weight: 500;
        }

        .vote-count {
            background-color: #e1bee7;
            color: #4a148c;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.9em;
            font-weight: bold;
        }

        .user-choice {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid #f3e5f5;
            text-align: center;
            color: #4a148c;
        }

        /* Кнопки */
        button {
            padding: 10px 20px;
            background-color: #6a1b9a;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #4a148c;
        }

        /* Навигация под карточкой */
        .nav-links {
            margin-top: 20px;
            text-align: center;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-links a {
            text-decoration: none;
        }
    </style>
</head>
<body>

    <!-- Основная карточка -->
    <div class="container">
        <h2>{{ voting.title }}</h2>

        {% if voting.description %}
            <p class="description">{{ voting.description }}</p>
        {% endif %}

        <ul>
            {% for option, votes in options_list %}
            <li>
                <span class="option-text">{{ option }}</span>
                <span class="vote-count">{{ votes }}</span>
            </li>
            {% endfor %}
        </ul>

        <div class="user-choice">
            <p><strong>Вы выбрали:</strong> {{ given_vote }}</p>
        </div>
    </div>

    <!-- Кнопки навигации -->
    <div class="nav-links">
        <a href="/"> <button>Главная страница</button> </a>
        {% if request.user.is_authenticated %}
            <a href="/profile/{{ request.user.username }}">
                <button>Профиль: {{ request.user }}</button>
            </a>
            <a href="/logout/">
                <button style="background-color: #555;">Выйти</button>
            </a>
        {% else %}
            <a href="/login/">
                <button>Войти</button>
            </a>
        {% endif %}
    </div>

</body>
</html>
