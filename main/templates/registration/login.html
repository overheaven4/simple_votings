<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Авторизация</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f3e5f5 0%, #e1bee7 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            margin: 0;
            padding: 20px;
        }
        button {
            padding: 10px 20px;
            background-color: #6a1b9a;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: background-color 0.3s;
            justify-content: center;
            text-align: center;
            margin-top: 10px;
        }
        .nav-links {
            margin-top: 20px;
            text-align: center;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-links a {
            text-decoration: none;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 550px;
            box-sizing: border-box;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1bee7;
            border-radius: 8px;
            box-sizing: border-box; /* Чтобы padding не раздувал ширину */
            transition: border-color 0.3s;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #9c27b0;
        }
                label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #6a1b9a;
        }
        .uno{
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <form method="post">
        {% csrf_token %}
        {{ form }}
        <div class="uno">
            <button type="submit">Войти</button>
        </div>
    </form>
</div>
</body>
    <!-- Кнопки навигации -->
    <div class="nav-links">
        <a href="/"> <button>Главная страница</button> </a>
        {% if request.user.is_authenticated %}
            <a href="/profile/{{ request.user.username }}">
                <button>Профиль: {{ request.user }}</button>
            </a>
            <a href="/logout/">
                <button style="background-color: #555;">Выйти</button>
            </a>

        {% endif %}
    </div>
</html>
