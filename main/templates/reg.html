<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
  body {
  display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    font-family: sans-serif;
  }
  .label-container {
    margin: 15px 0;
    padding: 15px;
    border: 1px solid #ccc;
    background-color: #f1f1f1;
    border-radius: 6px;
    text-align: center;
  }
  label {
    display: block;
    font-size: 18px;
    font-weight: bold;
    color: #355;
  }
</style>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <body style="background-color: lightblue;">
    <form>
        <div class="form-group">
            <label style="color: blue;" for="username">Введите имя пользователя:</label>
            <input type="text" id="username" name="username">
        </div>
        <div class="form-group">
            <label style="color: blue;" for="password">Придумайте пароль:</label>
            <input type="password" id="password" name="password">
        </div>
        <button style="color: black;" class="btn btn-danger" type="submit">Зарегестрировать пользователя</button>
    </form>
</div>
</body>
</html>
