<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Главная страница</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            --bg: #f7f7fb;
            --surface: #ffffff;
            --text: #1e1e1e;
            --primary: #4a90e2;       /* светлый кнопки */
            --primary-dark: #357abd;  /* темный цвет кнопки при наведении/активе */
            --muted: #6b7280;
            --border: #e5e7eb;
        }

        html, body {
            height: 100%;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: Arial, sans-serif;
        }

        .wrapper {
            min-height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 16px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 28px 28px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 6px 20px rgba(0,0,0,0.05);
        }

        h1 {
            font-size: 24px;
            margin: 0 0 16px;
            text-align: center;
        }

        .form-row {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 16px;
        }

        label {
            font-size: 14px;
            color: var(--muted);
        }

        input[type="text"],
        input[type="password"],
        input[type="email"] {
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            background: #fff;
        }

        .buttons {
            display: flex;
            gap: 12px;
            justify-content: space-between;
        }

        /* Светлая "популярная" кнопка */
        .btn {
            appearance: none;
            border: none;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.02s ease-in-out, background-color 0.2s ease;
        }

        /* Светлая тема кнопки */
        .btn.primary {
            background: var(--primary);
            color: white;
        }

        .btn.primary:hover {
            background: var(--primary-dark);
        }

        .btn.primary:active {
            transform: translateY(1px);
        }

        /* Темная версия подсветки (для темного режима можно адаптировать) */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0b1020;
                --surface: #141a2a;
                --text: #e8eaf6;
                --border: #273046;
                --muted: #96a2b8;
                --primary: #6ea8ff;
                --primary-dark: #4f85d9;
            }
            .card {
                border-color: var(--border);
                box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            }
        }

        /* Мобильная адаптация */
        @media (max-width: 420px) {
            .card { padding: 20px; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="card">
            <h1>Главная страница</h1>
            <form method="post" action="">
                <div class="form-row">
                    <label for="login">Введите логин</label>
                    <input id="login" name="login" type="text" required>
                </div>

                <!-- csrf_token можно вернуть, если используете Django/фреймворк -->
                <!-- {% csrf_token %} -->
                <!-- {{ form.as_p }} -->

                <div class="buttons">
                    <button type="submit" name="action" value="login" class="btn primary">Войти</button>
                    <button type="submit" name="action" value="register" class="btn primary" style="background: #e2e8f0; color: #111;">
                        Зарегистрироваться
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
